<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pomodoro Timer</title>
</head>
<body>
    <h1>Pomodoro Timer</h1>

    <!-- Configuration Inputs -->
    <fieldset id="settings">
        <legend>Timer Settings</legend>
        
        <p>
            <label for="sessions">Number of Study Sessions:</label>
            <input type="number" id="sessions" min="1" value="4" required>
        </p>

        <p>
            <label for="study-length">Study Session Length (mins):</label>
            <input type="number" id="study-length" min="30" max="120" value="30" required>
        </p>

        <p>
            <label for="break-length">Break Session Length (mins):</label>
            <input type="number" id="break-length" value="5" required>
            <span id="break-hint"></span>
        </p>
    </fieldset>

    <br>

    <!-- Controls -->
    <div>
        <button id="start-button">Start</button>
        <button id="pause-button" disabled>Pause</button>
        <button id="reset-button" disabled>Reset</button>
    </div>

    <hr>

    <!-- Display -->
    <h2>Phase: <span id="phase-display">Not Started</span></h2>
    <h1 id="time-display">00:00</h1>

    <h3>Progress</h3>
    <p>Study Time: <span id="study-time-display">0 / 0 mins</span></p>
    <p>Sessions Completed: <span id="sessions-display">0 / 0</span></p>

    <script src="app.js"></script>
</body>
</html>
